<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" width="56" height="56" role="img">
  <title>PrediPerps</title>
  <desc>PrediPerps PP monogram mark</desc>

  <!-- dark square background -->
  <rect x="0" y="0" width="38" height="56" rx="4" fill="#2C4A7C" />
  <!-- lime square overlapping right -->
  <rect x="18" y="0" width="38" height="56" rx="4" fill="#B4F000" />

  <!-- left P cutout from dark -->
  <rect x="6" y="8" width="8" height="40" fill="#2C4A7C" />
  <path d="M14,8 L32,8 L38,16 L32,26 L14,26 Z" fill="#2C4A7C" />

  <!-- right P cutout from lime -->
  <rect x="24" y="8" width="8" height="40" fill="#B4F000" />
  <path d="M32,8 L50,8 L56,16 L50,26 L32,26 Z" fill="#2C4A7C" />
</svg>
